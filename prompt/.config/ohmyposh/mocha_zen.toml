#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version = 2
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    background = 'transparent'
    foreground = 'p:blue'
    template = '{{ .Path }}'

    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    foreground = 'p:subtext0'
    background = 'transparent'
    template = ' {{ if .Merge }}<p:red>merge </>{{ .Ref }}{{ else if .Rebase }}<p:red>rebase </>{{ .Ref }}{{ else }}{{ .HEAD }}{{ end }}<p:teal>{{ if gt .Behind 0 }}⇣{{ .Behind }}{{ end }}{{ if gt .Ahead 0 }}⇡{{ .Ahead }}{{ end }}</><p:yellow>{{ if gt .StashCount 0 }} *{{ .StashCount }}{{ end }}</>{{ if gt .Working.Modified 0 }} <p:peach>~{{ .Working.Modified }}</>{{ end }}{{ if gt .Working.Untracked 0 }} <p:surface2>?{{ .Working.Untracked }}</>{{ end }}{{ if .Staging.Changed }} <p:lavender>+{{ add .Staging.Added .Staging.Modified .Staging.Deleted }}</>{{ end }}'

    [blocks.segments.properties]
      branch_icon = ''
      commit_icon = '@'
      fetch_status = true
	  fetch_upstream_icon = true
      fetch_push_status = true
      native_fallback = true


[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = 'p:yellow'
    background = 'transparent'
    template = '{{ .FormattedMs }}'

    [blocks.segments.properties]
      threshold = 5000

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground_templates = [
      "{{if gt .Code 0}}p:red{{end}}",
      "{{if eq .Code 0}}p:mauve{{end}}",
    ]
    background = 'transparent'
    template = '❯'

[transient_prompt]
  foreground_templates = [
    "{{if gt .Code 0}}p:red{{end}}",
    "{{if eq .Code 0}}p:lavender{{end}}",
  ]
  background = 'transparent'
  template = '❯ '

[secondary_prompt]
  foreground = 'p:lavender'
  background = 'transparent'
  template = '❯❯ '

[palette]
rosewater = '#f5e0dc'
flamingo = '#f2cdcd'
pink     = '#f5c2e7'
mauve    = '#cba6f7'
red      = '#f38ba8'
maroon   = '#eba0ac'
peach    = '#fab387'
yellow   = '#f9e2af'
green    = '#a6e3a1'
teal     = '#94e2d5'
sky      = '#89dceb'
sapphire = '#74c7ec'
blue     = '#89b4fa'
lavender = '#b4befe'
text     = '#cdd6f4'
subtext1 = '#bac2de'
subtext0 = '#a6adc8'
overlay2 = '#9399b2'
overlay1 = '#7f849c'
overlay0 = '#6c7086'
surface2 = '#585b70'
surface1 = '#45475a'
surface0 = '#313244'
base     = '#1e1e2e'
mantle   = '#181825'
crust    = '#11111b'

