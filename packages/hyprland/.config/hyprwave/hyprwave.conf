[General]
# Position de la barre compacte (top | bottom | left | right)
position = bottom

# Layer shell (background | bottom | top | overlay)
# "overlay" passe au-dessus de Waybar
layer = overlay

# Zone exclusive : 0 = superpose sur Waybar, 1 = pousse le contenu
exclusive_zone = 0

# Thème actif au démarrage (changeable à la volée)
theme = catppuccin-mocha

# Mode vertical style old-school MP3 player (true | false)
vertical_mode = false

[Visualizer]
# Visualiseur audio en mode idle
enabled = true
# Délai avant passage en mode visualiseur (secondes)
idle_timeout = 5

[Notifications]
# Notifications slide-in au changement de piste
enabled = true
