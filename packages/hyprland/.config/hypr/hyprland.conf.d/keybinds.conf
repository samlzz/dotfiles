###################
### KEYBINDINGS ###
###################
# See https://wiki.hyprland.org/Configuring/Binds/

$mainMod = SUPER

bind = $mainMod, F, fullscreen
bind = $mainMod, Y, togglefloating,
bind = $mainMod, Q, killactive,
bind = SHIFT CTRL, escape, exec, powerctl lock
bind = $mainMod SHIFT, X, exit,

############
# Launcher #

bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $term_float
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, M, exec, $music
bind = $mainMod, O, exec, $menu
bind = $mainMod, C, exec, $calc
bind = $mainMod, P, exec, $clipboard_menu
bind = $mainMod SHIFT, P, exec, $clipboard_menu --vault
bind = $mainMod, W, exec, $wifi_menu
bind = $mainMod, Z, exec, $bluetooth_menu

#################
# Notifications #

bind = $mainMod, N, exec, ~/.config/hypr/scripts/toggle-pannel.sh

bind = $mainMod, space, exec, swaync-client --close-latest
bind = $mainMod SHIFT, space, exec, swaync-client -C

#####################
## START Movements ##
#####################

##############
# Move focus #

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#####################
# Switch workspaces #

bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9
bind = $mainMod, 0, split-workspace, 10

# Special workspaces
bind = $mainMod, S, togglespecialworkspace, main
bind = $mainMod, D, togglespecialworkspace, dedicated
bind = $mainMod, H, togglespecialworkspace, hidden

# Interactive switch
bind = $mainMod alt, LEFT, split-workspace, e-1
bind = $mainMod alt, RIGHT, split-workspace, e+1

########################
# Moves in a workspace #

bind = $mainMod SHIFT CTRL, left, movewindow, l
bind = $mainMod SHIFT CTRL, right, movewindow, r
bind = $mainMod SHIFT CTRL, up, movewindow, u
bind = $mainMod SHIFT CTRL, down, movewindow, d

bind = $mainMod CTRL, left, layoutmsg, swapcol l
bind = $mainMod CTRL, right, layoutmsg, swapcol r

# Cycle window width
# ! Need 'scrolling' layout
bind = $mainMod, comma, layoutmsg, colresize -conf
bind = $mainMod, period, layoutmsg, colresize +conf
bind = $mainMod, slash, layoutmsg, colresize 0.51

############################
# Moves accross workspaces #

# Workspaces
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5
bind = $mainMod SHIFT, 6, split-movetoworkspace, 6
bind = $mainMod SHIFT, 7, split-movetoworkspace, 7
bind = $mainMod SHIFT, 8, split-movetoworkspace, 8
bind = $mainMod SHIFT, 9, split-movetoworkspace, 9
bind = $mainMod SHIFT, 0, split-movetoworkspace, 10

# Special workspaces
bind = $mainMod SHIFT, S, split-movetoworkspace, special:main
bind = $mainMod SHIFT, D, split-movetoworkspace, special:dedicated
bind = $mainMod SHIFT, H, split-movetoworkspace, special:hidden

# Monitors
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Interactive switch
bind = $mainMod SHIFT, left, split-movetoworkspace, e-1
bind = $mainMod SHIFT, right, split-movetoworkspace, e+1

# To manipulate window with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod CTRL, mouse:272, resizewindow

# Or use fast edit
source = ~/.config/hypr/hyprland.conf.d/fastedit.conf

############
# Overview #

bind = SUPER, TAB, hymission:toggle,onlycurrentworkspace
bind = SUPER SHIFT, TAB, hymission:toggle,forceall
# bind = SUPER, C, hymission:toggle,onlycurrentworksp\ace
# bind = SUPER, A, hymission:toggle,forceall
# bind = SUPER, M, hymission:debug_current_layout

gesture = 3, up, dispatcher, hymission:open,onlycurrentworkspace
gesture = 3, down, dispatcher, hymission:close,onlycurrentworkspace
# or: gesture = 3, horizontal, scrollMove


###################
## END Movements ##
###################

##############
# Screenshot #

bind = , PRINT, hyprcapture:open
bind = $mainMod, PRINT, hyprcapture:quick,window
bind = $mainMod SHIFT, F, hyprcapture:quick,fullscreen

########
# Zoom #

# Zoom in/out
bind = $mainMod CTRL, equal, exec, ~/.config/hypr/scripts/zoom_cursor.sh +0.1
bind = $mainMod CTRL, minus, exec, ~/.config/hypr/scripts/zoom_cursor.sh -0.1
# Restore zoom factor
bind = $mainMod CTRL, 0, exec, ~/.config/hypr/scripts/zoom_cursor.sh reset

##############
# Multimedia #

# Volume OSD
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Brightness screen (OSD) and keyboard
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = CTRL, XF86MonBrightnessUp, exec, brightnessctl -d chromeos::kbd_backlight set +5%
bind = CTRL, XF86MonBrightnessDown, exec, brightnessctl -d chromeos::kbd_backlight set 5%-

# Caps lock
bind = SHIFT, code:66, exec, sleep 0.2 && swayosd-client --caps-lock

# Requires playerctl
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

