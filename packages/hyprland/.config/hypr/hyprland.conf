source = ~/.config/hypr/hyprland.conf.d/style.conf
source = ~/.config/hypr/hyprland.conf.d/programs.conf
source = ~/.config/hypr/hyprland.conf.d/keybinds.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,preferred,auto,1
monitor=DP-4,highres,auto-up,1


#############################
### ENVIRONMENT VARIABLES ###
#############################
# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = fr
    kb_variant = us
    kb_model =
    kb_options = caps:escape_shifted_capslock
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = adaptive

    touchpad {
        natural_scroll = true
	clickfinger_behavior = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gesture = 3, horizontal, workspace

###############
### PLUGINS ###
###############

plugin {
	split-monitor-workspaces {
		count = 5
	}

    hyprcapture {
        default_mode = region
        fullscreen_scope = all
        window_background = follow-system
        window_border = keep
        window_shadow = remove
        save = 1
        clipboard = 1
        show_thumbnail = 1
        allow_quick = 1
        confirm_before_capture = 0
        fusion_mode = 0
        save_dir = $XDG_PICTURES_DIR/Screenshots
        filename_template = Screenshot-%Y-%m-%d-%H%M%S.png
        record_save_dir = $XDG_VIDEOS_DIR/Screenrecords
        record_filename_template = Recording-%Y-%m-%d-%H%M%S.mp4
        record_format = mp4
        record_transparent_format = webm
        record_fps = 30
        record_fps_options = 15 24 30 60
        record_window_fps_limit = 12
        record_window_real_bg_fps_limit = 8
        record_codec = libx264
        record_transparent_codec = auto
        record_solid_alpha = 0
        record_preset = veryfast
        record_gsr_flags =
        record_window_backend = compositor
        record_max_seconds = 0
        record_countdown_seconds = 0
        include_cursor = 0
        thumbnail_timeout_ms = 5000
        watermark =
        watermark_position = central
        watermark_width = 20%
        watermark_offset = 0 0
    }
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
# windowrule = no_inital_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pinned 0

# For swayosd notification
windowrule = float on, match:class ^swayosd-server$
windowrule = size 280 60, match:class ^swayosd-server$
windowrule = move (monitor_w/2)-100 80, match:class ^swayosd-server$
windowrule = no_initial_focus on, match:class ^swayosd-server$

# Floating terminal
windowrule = float on, match:class ^term-float.*$
windowrule = size 1460 1020, match:class ^term-float.*$
windowrule = center on, match:class ^term-float.*$

# WayWea — top-left, just below waybar
windowrule = size 720 400, match:class ^term-float\.waywea$
windowrule = move 10 50, match:class ^term-float\.waywea$
windowrule = no_initial_focus on, match:class ^term-float\.waywea$
windowrule = pin on, match:class ^term-float\.waywea$
windowrule = dim_around on, match:class ^term-float\.waywea$

decoration {
	dim_around=0.40
}

# Blured fs_popup
layerrule = blur on, match:class ^(com\.fspopup\.GtkApplication)$

layerrule = blur on, match:class waybar
# layerrule = ignorezero, waybar
layerrule = ignore_alpha 0.5, match:class waybar

misc {
    focus_on_activate = true
}
